<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>CIATA PLAYLIST</title>

  <!-- FONT -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->

  <link rel="stylesheet" href="Tes.css" />

</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <h1 class="logo">
      CIATA
    </h1>

    <ul>

      <li
        id="homeBtn"
        class="active"
      >
        🏠
      </li>

      <li id="searchBtn">
        🔍
      </li>

    </ul>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- HOME PAGE -->

    <section id="homePage">

      <h2>
        Home
      </h2>

      <div class="song-list">

        <!-- SONG 1 -->

        <div
          class="song-card"

          data-song="Song/sway.m4a"

          data-title="SWAY"

          data-artist="Ciata"
        >

          <img
            src="img/Sway.jpg"

            alt="Cover lagu SWAY"
          />

          <h3>
            SWAY
          </h3>

          <p>
            Ciata
          </p>

        </div>

        <!-- SONG 2 -->

        <div
          class="song-card"

          data-song="Song/Rockabye.m4a"

          data-title="ROCKABYE"

          data-artist="Ciata"
        >

          <img
            src="img/Rockabye.jpg"

            alt="Cover lagu ROCKABYE"
          />

          <h3>
            ROCKABYE
          </h3>

          <p>
            Ciata
          </p>

        </div>

        <!-- SONG 3 -->

        <div
          class="song-card"

          data-song="Song/Staywithme.m4a"

          data-title="STAY WITH ME"

          data-artist="Ciata"
        >

          <img
            src="img/Staywithme.jpg"

            alt="Cover lagu STAYWITHME"
          />

          <h3>
            STAY WITH ME
          </h3>

          <p>
            Ciata
          </p>

        </div>
        
        
        <!-- SONG 4 -->

        <div
          class="song-card"

          data-song="Song/Bermuara.m4a"

          data-title="BERMUARA"

          data-artist="Ciata"
        >

          <img
            src="img/Bermuara.jpg"

            alt="Cover lagu BERMUARA"
          />

          <h3>
            BERMUARA
          </h3>

          <p>
            Ciata
          </p>

        </div>

        <!-- SONG 5 -->

        <div
          class="song-card"

          data-song="Song/Heartattack.m4a"

          data-title="HEART ATTACK"

          data-artist="Ciata"
        >

          <img
            src="img/Heartattack.jpg"

            alt="Cover lagu HEART ATTACK"
          />

          <h3>
            HEART ATTACK
          </h3>

          <p>
            Ciata
          </p>

        </div>



        <!-- SONG 6 -->

        <div
          class="song-card"

          data-song="Song/Kitst.m4a"

          data-title="KOTA INI TAK SAMA TANPAMU"

          data-artist="Ciata"
        >

          <img
            src="img/Kitst.jpg"

            alt="Cover lagu KOTA INI TAK SAMA TANPAMU"
          />

          <h3>
            KOTA INI TAK SAMA TANPAMU
          </h3>

          <p>
            Ciata
          </p>

        </div>
      </div>

    </section>

    <!-- SEARCH PAGE -->

    <section
      id="searchPage"
      class="hidden"
    >

      <h2>
        Search Lagu
      </h2>

      <input
        type="text"

        id="searchInput"

        placeholder="Cari lagu atau artist..."
      />

      <div
        id="searchResult"
        class="song-list"
      >

        <p class="empty-state">
          Cari lagu favoritmu...
        </p>

      </div>

    </section>

  </main>

  <!-- PLAYER -->

  <footer class="player">

    <!-- SONG INFO -->

    <div class="player-top">

      <!-- COVER -->

      <img
        id="cover"

        src="img/Sway.jpg"

        alt="Cover Lagu"
      />

      <!-- TEXT -->

      <div class="song-info">

        <h4 id="title">
          Click the song u want to play
        </h4>

        <p id="artist">
          -
        </p>

      </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

      <button
        id="prevBtn"

        aria-label="Previous Song"
      >
        ⏮
      </button>

      <button
        id="playBtn"

        aria-label="Play Song"
      >
        ▶
      </button>

      <button
        id="nextBtn"

        aria-label="Next Song"
      >
        ⏭
      </button>

    </div>

    <!-- PROGRESS -->

    <div class="progress-container">

      <div
        class="progress"
        id="progress"
      ></div>

    </div>

    <!-- TIME -->

    <div class="time">

      <span id="currentTime">
        0:00
      </span>

      <span id="duration">
        0:00
      </span>

    </div>

    <!-- AUDIO -->

    <audio
      id="audio"

      preload="metadata"
    ></audio>

  </footer>

  <!-- SCRIPT -->

  <script src="Tes.js"></script>

</body>
</html>
